<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu Virtual de Memórias Digitais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Museu Virtual de Memórias Digitais</h1>
        <p>Explore e compartilhe suas memórias em um ambiente interativo.</p>
        <button id="start-button">Entrar no Museu</button>
    </header>

    <main id="museum" style="display: none;">
        <nav>
            <ul>
                <li><button class="room-button" data-room="infancia">Infância</button></li>
                <li><button class="room-button" data-room="viagens">Viagens</button></li>
                <li><button class="room-button" data-room="musica">Música</button></li>
            </ul>
        </nav>
        
        <section id="room-display">
            <h2>Bem-vindo ao Museu</h2>
            <p>Selecione uma sala para explorar memórias.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Museu Virtual de Memórias Digitais. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
